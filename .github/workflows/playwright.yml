name: Rolnopol Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Override via repository variables/secrets when configured; defaults suit the Docker Compose app.
env:
  BASE_URL: http://localhost:3000
  API_BASE_URL: http://localhost:3000/api/v1
  OPENAPI_URL: http://localhost:3000/schema/openapi.json
  USER_EMAIL: demo@example.com
  USER_PASSWORD: demo123

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run quality checks
        run: npm run quality:quick

      - name: Start Rolnopol
        run: npm run app:start

      - name: Wait for Rolnopol
        run: npm run app:wait

      - name: Run Playwright tests
        run: npm test

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Rolnopol
        if: always()
        run: npm run app:stop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
