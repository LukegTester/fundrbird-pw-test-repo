name: Rolnopol Playwright Tests

# Triggered manually only — this project is CI-ready but not meant to run on every push.
# Set these in GitHub → Settings → Secrets and variables → Actions before running:
#   Variables : BASE_URL, API_BASE_URL, OPENAPI_URL, USER_EMAIL
#   Secrets   : USER_PASSWORD
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BASE_URL: ${{ vars.BASE_URL }}
  API_BASE_URL: ${{ vars.API_BASE_URL }}
  OPENAPI_URL: ${{ vars.OPENAPI_URL }}
  USER_EMAIL: ${{ vars.USER_EMAIL }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run quality checks
        run: npm run quality:quick

      - name: Start Rolnopol
        run: npm run app:start

      - name: Wait for Rolnopol
        run: npm run app:wait

      - name: Run Playwright tests
        run: npm test

      - name: Print Docker logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop Rolnopol
        if: always()
        run: npm run app:stop

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload report to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    name: Deploy report to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
